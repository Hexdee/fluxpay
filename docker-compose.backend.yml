services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluxpay
    ports:
      - "5432:5432"
    volumes:
      - fluxpay_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      API_BASE_URL: http://localhost:4000
      CHECKOUT_BASE_URL: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fluxpay
      DOCS_PATH: /docs
      EXPOSE_DEV_AUTH_CODES: "true"
      # Optional chain + email vars go here.
    volumes:
      - ./docs:/docs:ro
    ports:
      - "4000:4000"

volumes:
  fluxpay_pgdata:

